<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
    * {
        box-sizing: border-box;
        margin : 0;
        padding : 0;
    }
    body {
        background : #f0f2f5;
        display : flex;
        justify-content: center;
        align-items: center;
    }
    .login-card {
        background: #ffffff;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 400px;
        text-align: left;
    }
    h2 {
        color: #111827;
        font-size: 26px;
        font-weight: 700;
        margin-bottom: 30px;
        text-align: center;
    }
    .form-group {
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #4b5563;
        font-size: 14px;
    }
    input[type="text"],
    input[type="password"] {
        width: 100%;
        padding: 14px;
        border: 2px solid #e5e7eb;
        border-radius: 8px;
        font-size: 15px;
        transition: all 0.3s ease;
        outline: none;
    }
    button {
        width: 100%;
        padding: 14px;
        background-color: #2563eb;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.3s ease, transform 0.1s ease;
        margin-top: 10px;
    }
    button:hover {
        background-color: #1d4ed8;
    }
    button:active {
        transform: scale(0.98);
    }
    .footer-note {
        margin-top: 25px;
        text-align: center;
        color: #9ca3af;
        font-size: 13px;
    }

</style>
</head>

<body>

<h2>Login</h2>

<form method="post">
{% csrf_token %}

<label>Login ID</label><br>
<input type="text" name="username"><br><br>

<label>Password</label><br>
<input type="password" name="password"><br><br>

<button type="submit">Login</button>

</form>

<br>

<a href="/signup/">Sign Up</a>

</body>
</html>
