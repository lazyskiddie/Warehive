<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Premium UI</title>
<style>
    
    :root {
        --primary-color: #d9381e; 
        --primary-hover: #b92b15;
        --primary-glow: rgba(217, 56, 30, 0.2);
        
        
        --bg-body: #f3f4f6;
        --bg-card: #ffffff;
        --text-main: #1f2937;
        --text-muted: #6b7280;
        --input-bg: #f9fafb;
        --input-border: #e5e7eb;
        --shadow-card: 0 20px 40px -15px rgba(0, 0, 0, 0.05);
        --toggle-bg: #e5e7eb;
        --toggle-icon: #f59e0b; 
    }

    
    [data-theme="dark"] {
        --bg-body: #111827;
        --bg-card: #1f2937;
        --text-main: #f9fafb;
        --text-muted: #9ca3af;
        --input-bg: #374151;
        --input-border: #4b5563;
        --shadow-card: 0 20px 40px -15px rgba(0, 0, 0, 0.4);
        --toggle-bg: #374151;
        --toggle-icon: #fbbf24; 
    }

    
    body {
        margin: 0;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        background-color: var(--bg-body);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: var(--text-main);
        transition: background-color 0.4s ease, color 0.4s ease;
    }

    
    .theme-toggle {
        position: absolute;
        top: 20px;
        right: 20px;
        background: var(--toggle-bg);
        border: none;
        border-radius: 50px;
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s ease;
        color: var(--toggle-icon);
    }

    .theme-toggle:hover {
        transform: scale(1.1);
    }

    .theme-toggle svg {
        width: 24px;
        height: 24px;
        fill: currentColor;
    }

    
    .login-container {
        width: 100%;
        max-width: 480px;
        background: var(--bg-card);
        border-radius: 24px;
        padding: 45px 50px;
        box-sizing: border-box;
        box-shadow: var(--shadow-card);
        transition: background-color 0.4s ease, box-shadow 0.4s ease;
    }

    .logo-box {
        width: 72px;
        height: 48px;
        border: 2px solid var(--primary-color);
        border-radius: 12px;
        margin: 0 auto 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--primary-color);
        font-weight: 700;
        font-size: 14px;
        letter-spacing: 1px;
    }

    h2 {
        text-align: center;
        margin: 0 0 8px 0;
        font-size: 28px;
        font-weight: 700;
    }

    .sub-text {
        text-align: center;
        color: var(--text-muted);
        font-size: 14px;
        margin-bottom: 35px;
        transition: color 0.4s ease;
    }

    .form-group {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
    }

    .form-group label {
        flex: 0 0 35%;
        color: var(--primary-color);
        font-size: 14px;
        font-weight: 600;
    }

    .form-group input {
        flex: 0 0 60%;
        height: 46px;
        background-color: var(--input-bg);
        border: 1.5px solid var(--input-border);
        border-radius: 12px;
        padding: 0 16px;
        font-size: 14px;
        color: var(--text-main);
        box-sizing: border-box;
        outline: none;
        transition: all 0.3s ease;
    }

    .form-group input::placeholder {
        color: var(--text-muted);
        opacity: 0.7;
    }

    .form-group input:focus {
        border-color: var(--primary-color);
        background-color: var(--bg-card);
        box-shadow: 0 0 0 4px var(--primary-glow);
    }

    .button-box {
        text-align: center;
        margin-top: 35px;
    }

    button[type="submit"] {
        width: 100%; 
        padding: 14px 40px;
        border: none;
        border-radius: 12px;
        background: var(--primary-color);
        color: white;
        font-weight: 600;
        font-size: 15px;
        letter-spacing: 0.5px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 12px var(--primary-glow);
    }

    button[type="submit"]:hover {
        background: var(--primary-hover);
        transform: translateY(-2px);
        box-shadow: 0 6px 16px var(--primary-glow);
    }

    
    .bottom-links {
        text-align: center;
        margin-top: 25px;
        color: var(--text-muted);
        font-size: 14px;
    }

    .bottom-links a {
        color: var(--text-muted);
        text-decoration: none;
        font-weight: 500;
        transition: color 0.3s ease;
        padding: 0 6px;
    }

    .bottom-links a:hover {
        color: var(--primary-color);
    }
</style>
</head>
<body>

<button class="theme-toggle" id="theme-toggle" aria-label="Toggle Dark Mode"></button>

<div class="login-container">
    <div class="logo-box">Logo</div>
    
    <h2>Welcome Back</h2>
    <div class="sub-text">Please sign in to your account</div>

    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label>Login Id</label>
            <input type="text" name="username" placeholder="Enter your login ID" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>

        <div class="button-box">
            <button type="submit">SIGN IN</button>
        </div>
    </form>

    <div class="bottom-links">
        <a href="/forget-password/">Forget Password ?</a> | <a href="/signup/">Sign Up</a>
    </div>
</div>

<script>
    const themeToggleBtn = document.getElementById('theme-toggle');
    const sunIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2.25a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V3a.75.75 0 01.75-.75zM7.5 12a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM18.894 6.166a.75.75 0 00-1.06-1.06l-1.591 1.59a.75.75 0 101.06 1.061l1.591-1.59zM21.75 12a.75.75 0 01-.75.75h-2.25a.75.75 0 010-1.5H21a.75.75 0 01.75.75zM17.834 18.894a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 10-1.061 1.06l1.59 1.591zM12 18a.75.75 0 01.75.75V21a.75.75 0 01-1.5 0v-2.25A.75.75 0 0112 18zM7.758 17.303a.75.75 0 00-1.061-1.06l-1.591 1.59a.75.75 0 001.06 1.061l1.591-1.59zM6 12a.75.75 0 01-.75.75H3a.75.75 0 010-1.5h2.25A.75.75 0 016 12zM6.697 7.757a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 00-1.061 1.06l1.59 1.591z" /></svg>`;
    const moonIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M9.528 1.718a.75.75 0 01.162.819A8.97 8.97 0 009 6a9 9 0 009 9 8.97 8.97 0 003.463-.69.75.75 0 01.981.98 10.503 10.503 0 01-9.694 6.46c-5.799 0-10.5-4.701-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 01.818.162z" clip-rule="evenodd" /></svg>`;

    const savedTheme = localStorage.getItem('theme');
    const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    let currentTheme = 'light';
    if (savedTheme) {
        currentTheme = savedTheme;
    } else if (systemPrefersDark) {
        currentTheme = 'dark';
    }

    function applyTheme(theme) {
        if (theme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeToggleBtn.innerHTML = sunIcon;
        } else {
            document.documentElement.removeAttribute('data-theme');
            themeToggleBtn.innerHTML = moonIcon;
        }
    }

    applyTheme(currentTheme);

    themeToggleBtn.addEventListener('click', () => {
        currentTheme = currentTheme === 'light' ? 'dark' : 'light';
        applyTheme(currentTheme);
        localStorage.setItem('theme', currentTheme);
    });

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
        if (!localStorage.getItem('theme')) { 
            const newSystemTheme = e.matches ? 'dark' : 'light';
            applyTheme(newSystemTheme);
            currentTheme = newSystemTheme;
        }
    });
</script>

</body>
</html>
