<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
     * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'DM Sans', sans-serif;
        background: #0f0f13;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        position: relative;
        overflow: hidden;
    }

    body::before,
    body::after {
        content: '';
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        pointer-events: none;
        z-index: 0;
    }
    body::before {
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, rgba(99, 102, 241, 0.18) 0%, transparent 70%);
        top: -120px;
        left: -100px;
        animation: drift1 8s ease-in-out infinite alternate;
    }
    body::after {
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, rgba(236, 72, 153, 0.12) 0%, transparent 70%);
        bottom: -100px;
        right: -80px;
        animation: drift2 10s ease-in-out infinite alternate;
    }

    @keyframes drift1 {
        from { transform: translate(0, 0) scale(1); }
        to   { transform: translate(40px, 30px) scale(1.08); }
    }
    @keyframes drift2 {
        from { transform: translate(0, 0) scale(1); }
        to   { transform: translate(-30px, -20px) scale(1.1); }
    }

    .login-card {
        background: rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        padding: 48px 44px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow:
            0 0 0 1px rgba(255,255,255,0.04),
            0 32px 64px rgba(0, 0, 0, 0.5),
            inset 0 1px 0 rgba(255,255,255,0.08);
        width: 100%;
        max-width: 420px;
        text-align: left;
        position: relative;
        z-index: 1;
        animation: cardIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardIn {
        from {
            opacity: 0;
            transform: translateY(28px) scale(0.97);
        }
        to {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }

    .login-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 10%;
        right: 10%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.6), rgba(236, 72, 153, 0.4), transparent);
        border-radius: 50%;
    }

    h2 {
        font-family: 'DM Serif Display', serif;
        color: #f9fafb;
        font-size: 30px;
        font-weight: 400;
        margin-bottom: 8px;
        text-align: center;
        letter-spacing: -0.3px;
    }

    .subtitle {
        text-align: center;
        color: #6b7280;
        font-size: 14px;
        margin-bottom: 36px;
        letter-spacing: 0.1px;
    }

    .form-group {
        margin-bottom: 22px;
        position: relative;
    }

    label {
        display: block;
        margin-bottom: 9px;
        font-weight: 500;
        color: #9ca3af;
        font-size: 13px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
    }

    input[type="text"],
    input[type="password"] {
        width: 100%;
        padding: 14px 16px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        font-size: 15px;
        font-family: 'DM Sans', sans-serif;
        color: #f3f4f6;
        transition: all 0.25s ease;
        outline: none;
        caret-color: #818cf8;
    }

    input[type="text"]::placeholder,
    input[type="password"]::placeholder {
        color: rgba(255, 255, 255, 0.18);
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
        border-color: rgba(99, 102, 241, 0.6);
        background: rgba(99, 102, 241, 0.07);
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
        color: #fff;
    }

    input[type="text"]:hover:not(:focus),
    input[type="password"]:hover:not(:focus) {
        border-color: rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.07);
    }

    button {
        width: 100%;
        padding: 15px;
        background: linear-gradient(135deg, #6366f1 0%, #818cf8 50%, #a78bfa 100%);
        background-size: 200% 200%;
        background-position: 0% 50%;
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 600;
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        transition: background-position 0.4s ease, transform 0.15s ease, box-shadow 0.3s ease;
        margin-top: 12px;
        letter-spacing: 0.3px;
        box-shadow: 0 4px 24px rgba(99, 102, 241, 0.35);
        position: relative;
        overflow: hidden;
    }

    button::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
        border-radius: 12px;
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    button:hover {
        background-position: 100% 50%;
        box-shadow: 0 6px 32px rgba(99, 102, 241, 0.5);
        transform: translateY(-1px);
    }

    button:hover::after {
        opacity: 1;
    }

    button:active {
        transform: scale(0.98) translateY(0);
        box-shadow: 0 2px 12px rgba(99, 102, 241, 0.3);
    }

    .footer-note {
        margin-top: 28px;
        text-align: center;
        color: #6b7280;
        font-size: 14px;
    }

    .footer-note a {
        color: #818cf8;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.2s ease;
        position: relative;
    }

    .footer-note a::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 0;
        height: 1px;
        background: #818cf8;
        transition: width 0.25s ease;
    }

    .footer-note a:hover {
        color: #a5b4fc;
    }

    .footer-note a:hover::after {
        width: 100%;
    }

    .form-group:nth-child(2) { animation: fadeUp 0.5s 0.2s cubic-bezier(0.22,1,0.36,1) both; }
    .form-group:nth-child(3) { animation: fadeUp 0.5s 0.32s cubic-bezier(0.22,1,0.36,1) both; }
    button { animation: fadeUp 0.5s 0.44s cubic-bezier(0.22,1,0.36,1) both; }
    .footer-note { animation: fadeUp 0.5s 0.54s cubic-bezier(0.22,1,0.36,1) both; }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
    }

</style>
</head>

<body>

<h2>Login</h2>

<div class="login-card">
<form method="post">
{% csrf_token %}

<div class="form-group">
<label>Login ID</label><br>
<input type="text" name="username" placeholder="Enter your login ID"><br><br>
</div>

<div class="form-group">
<label>Password</label><br>
<input type="password" name="password" placeholder="Enter your password"><br><br>
</div>

<button type="submit">Login</button>


</form>

<br>

<div class="footer-note">
<a href="/signup/">Sign Up</a>
</div>
</div>

</body>
</html>
