<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>
<style>
    :root {
        --primary-color: #d9381e;
        --primary-hover: #b92b15;
        --text-dark: #1f2937;
        --text-light: #6b7280;
        --card-bg: rgba(255, 255, 255, 0.92);
        --input-bg: #ffffff;
        --input-border: #e5e7eb;
        --shadow-main: 0 20px 50px rgba(15, 23, 42, 0.08);
        --shadow-soft: 0 10px 25px rgba(217, 56, 30, 0.08);
        --error-color: #dc2626;
        --success-color: #16a34a;
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background:
            radial-gradient(circle at top left, rgba(217, 56, 30, 0.10), transparent 30%),
            radial-gradient(circle at bottom right, rgba(217, 56, 30, 0.08), transparent 28%),
            linear-gradient(135deg, #fffaf9 0%, #f4f7fb 100%);
        padding: 30px 16px;
    }

    .signup-container {
        width: 100%;
        max-width: 520px;
        background: var(--card-bg);
        border-radius: 28px;
        padding: 42px 42px 34px;
        box-shadow: var(--shadow-main), var(--shadow-soft);
        border: 1px solid rgba(217, 56, 30, 0.10);
        backdrop-filter: blur(10px);
        position: relative;
        overflow: hidden;
    }

    .signup-container::before {
        content: "";
        position: absolute;
        top: -80px;
        right: -60px;
        width: 180px;
        height: 180px;
        background: radial-gradient(circle, rgba(217, 56, 30, 0.12), transparent 70%);
        border-radius: 50%;
    }

    .signup-container::after {
        content: "";
        position: absolute;
        bottom: -100px;
        left: -70px;
        width: 200px;
        height: 200px;
        background: radial-gradient(circle, rgba(217, 56, 30, 0.08), transparent 70%);
        border-radius: 50%;
    }

    .content {
        position: relative;
        z-index: 2;
    }

    .logo-box {
        width: 88px;
        height: 56px;
        margin: 0 auto 26px;
        border-radius: 16px;
        background: linear-gradient(135deg, #fff, #fff5f3);
        border: 2px solid rgba(217, 56, 30, 0.7);
        box-shadow: 0 8px 20px rgba(217, 56, 30, 0.12);
        display: flex;
        justify-content: center;
        align-items: center;
        color: var(--primary-color);
        font-weight: 700;
        font-size: 14px;
        letter-spacing: 0.8px;
    }

    h2 {
        text-align: center;
        color: var(--text-dark);
        margin: 0 0 8px 0;
        font-size: 30px;
        font-weight: 700;
    }

    .sub-text {
        text-align: center;
        color: var(--text-light);
        font-size: 14px;
        margin-bottom: 26px;
        line-height: 1.6;
    }

    .message {
        display: none;
        margin-bottom: 18px;
        padding: 12px 14px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 500;
    }

    .message.error {
        background: #fef2f2;
        color: var(--error-color);
        border: 1px solid #fecaca;
    }

    .message.success {
        background: #f0fdf4;
        color: var(--success-color);
        border: 1px solid #bbf7d0;
    }

    .form-group {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
    }

    .form-group label {
        flex: 0 0 38%;
        color: var(--primary-color);
        font-size: 14px;
        font-weight: 600;
        line-height: 1.4;
    }

    .form-group input {
        flex: 0 0 58%;
        height: 46px;
        border: 1px solid var(--input-border);
        border-radius: 14px;
        padding: 0 16px;
        font-size: 14px;
        color: var(--text-dark);
        background: var(--input-bg);
        outline: none;
        transition: all 0.25s ease;
        box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.03);
    }

    .form-group input::placeholder {
        color: #b8bec8;
    }

    .form-group input:hover {
        border-color: #d8dce3;
    }

    .form-group input:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 4px rgba(217, 56, 30, 0.10);
        transform: translateY(-1px);
    }

    .form-group input.invalid {
        border-color: var(--error-color);
        box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.08);
    }

    .button-box {
        text-align: center;
        margin-top: 30px;
    }

    button {
        min-width: 180px;
        padding: 13px 34px;
        border: none;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--primary-color), #ef5b3d);
        color: #ffffff;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.8px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 10px 22px rgba(217, 56, 30, 0.20);
    }

    button:hover {
        background: linear-gradient(135deg, var(--primary-hover), #d9381e);
        transform: translateY(-2px);
        box-shadow: 0 14px 28px rgba(217, 56, 30, 0.26);
    }

    .back-link {
        text-align: center;
        margin-top: 22px;
    }

    .back-link a {
        color: var(--text-light);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.25s ease;
    }

    .back-link a:hover {
        color: var(--primary-color);
        text-decoration: underline;
    }

    @media (max-width: 600px) {
        .signup-container {
            padding: 32px 22px 28px;
            border-radius: 22px;
        }

        h2 {
            font-size: 26px;
        }

        .form-group {
            flex-direction: column;
            align-items: stretch;
            gap: 8px;
        }

        .form-group label,
        .form-group input {
            flex: 1 1 100%;
            width: 100%;
        }

        button {
            width: 100%;
        }
    }
</style>
</head>
<body>

<div class="signup-container">
    <div class="content">
        <div class="logo-box">LOGO</div>

        <h2>Create Account</h2>
        <div class="sub-text">Sign up to continue to your account</div>

        <div id="errorMessage" class="message error"></div>
        <div id="successMessage" class="message success"></div>

        <form method="post" id="signupForm">
            {% csrf_token %}

            <div class="form-group">
                <label>Enter Login Id</label>
                <input type="text" name="username" id="username" placeholder="6-12 characters" minlength="6" maxlength="12" required>
            </div>

            <div class="form-group">
                <label>Enter Email Id</label>
                <input type="email" name="email" id="email" placeholder="name@example.com" required>
            </div>

            <div class="form-group">
                <label>Enter Password</label>
                <input type="password" name="password" id="password" placeholder="Min. 8 characters" pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*[^a-zA-Z0-9]).{8,}" title="Must contain at least one uppercase, one lowercase, one special character, and be more than 8 characters long." required>
            </div>

            <div class="form-group">
                <label>Re-Enter Password</label>
                <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm password" required>
            </div>

            <div class="button-box">
                <button type="submit">SIGN UP</button>
            </div>
        </form>

        <div class="back-link">
            <a href="/">Back to Login</a>
        </div>
    </div>
</div>

<script>
    const signupForm = document.getElementById("signupForm");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirm_password");
    const errorMessage = document.getElementById("errorMessage");
    const successMessage = document.getElementById("successMessage");

    signupForm.addEventListener("submit", function(e) {
        errorMessage.style.display = "none";
        successMessage.style.display = "none";
        password.classList.remove("invalid");
        confirmPassword.classList.remove("invalid");

        if (password.value !== confirmPassword.value) {
            e.preventDefault();
            errorMessage.textContent = "Passwords do not match. Please enter the same password in both fields.";
            errorMessage.style.display = "block";
            password.classList.add("invalid");
            confirmPassword.classList.add("invalid");
            confirmPassword.focus();
        }
    });
</script>

</body>
</html>
